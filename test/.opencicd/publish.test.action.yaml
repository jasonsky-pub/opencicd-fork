inputs:
    - INPUT1
secrets:
    - SECRET1
dependencies:
    - test3
jobs:

    -   image: alpine:3.21
        arguments: ls -al /opt/folder/something
        volumes:
            ".": "/opt/folder/something"

    -   image: alpine:3.21
        arguments:
            - echo
            - "Image string, Entrypoint not specified"

    -   image: "alpine:${|ALPINE_VERSION|}"
        arguments:
            - echo
            - "Env Test"
            - " test: "
            - ${|TEST|}
            - " secret: "
            - ${|SECRET1|}
        environment:
            TEST: TestValue-${|INPUT1|}
            ALPINE_VERSION: 3.21


    -   image: alpine:3.21
        entrypoint-type: default
        arguments:
            - echo
            - "Image string, Entrypoint Type: default"

    -   image: alpine:3.21
        entrypoint-type: default
        arguments:
            - echo
            - "Image location"

    -   image: alpine:3.21
        entrypoint-type: override
        entrypoint-override: sh
        arguments:
            - "-c"
            - 'echo "Entrypoint Override"'

    -   image: alpine:3.21
        arguments:
            - find
            - "."

    -   image: alpine:3.21
        arguments:
            - ls
            - "-al"

    -   image: alpine:3.21
        entrypoint-type: script
        entrypoint-script: .opencicd/publish-test.sh
        arguments:
            - "Entrypoint script"

    -   dockerfile: .opencicd/publish-test.dockerfile
        entrypoint-type: override
        entrypoint-override: bash
        arguments:
            - "-c"
            - 'echo "Image Build"'

    -   dockerfile: .opencicd/publish-test.dockerfile
        entrypoint-type: noop
        build-output-file: dist/output.tar
        build-output-name-file: dist/output.name.txt
            login-registry: "registry.example.com"
        push-tags: "1,2,3"
            push-image: "example-org/opencicd-testing"



